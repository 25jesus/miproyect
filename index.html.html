<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa 300 Boletos</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 5px; }
    .boleto {
      padding: 15px 0; border-radius: 8px; border: none;
      font-weight: bold; font-size: 16px; cursor: pointer;
      transition: 0.2s; color: white; background: #27ae60;
    }
    .boleto.vendido { background: #e74c3c; cursor: not-allowed; }
    .boleto:disabled { opacity: 0.7; }
    h2 { margin: 10px 0; }
  </style>
</head>
<body>
  <h2>Rifa - Boletos Disponibles</h2>
  <p>Haz clic en un número verde para venderlo. Se bloquea al instante para todos.</p>
  <div id="botones" class="grid"></div>

  <!-- Scripts de Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script>
    // ⚙️ REEMPLAZA ESTO CON TUS PROPIAS CREDENCIALES DE FIREBASE
    const firebaseConfig = {
      // AQUI PEGAS TU CONFIGURACIÓN
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const total = 300;
    const grid = document.getElementById('botones');

    // Inicializar los boletos si no existen en la base de datos
    const initRef = db.ref('boletos/1');
    initRef.once('value', (snap) => {
      if (!snap.exists()) {
        for (let i = 1; i <= total; i++) {
          db.ref('boletos/' + i).set({
            numero: i,
            estado: 'disponible'
          });
        }
      }
    });

    // Escuchar cambios en toda la lista de boletos
    db.ref('boletos').on('value', (snapshot) => {
      grid.innerHTML = '';
      const data = snapshot.val() || {};
      for (let i = 1; i <= total; i++) {
        const boleto = data[i] || { estado: 'disponible' };
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.classList.add('boleto');
        btn.disabled = (boleto.estado === 'vendido');
        if (boleto.estado === 'vendido') {
          btn.classList.add('vendido');
        }

        // Acción al hacer clic: vender inmediatamente
        btn.addEventListener('click', () => {
          if (boleto.estado !== 'vendido') {
            // Actualiza el boleto a vendido de forma atómica
            db.ref('boletos/' + i).update({ estado: 'vendido' });
          }
        });

        grid.appendChild(btn);
      }
    });
  </script>
</body>
</html>
